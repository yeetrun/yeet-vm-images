name: Build Ubuntu 26.04 VM image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release/image version to publish.
        required: true
        default: ubuntu-26.04-amd64-v11
      yeet_ref:
        description: yeet repository ref used to build guest/yeet-init.
        required: true
        default: main
      ubuntu_cloud_base_url:
        description: Ubuntu cloud image directory URL.
        required: true
        default: https://cloud-images.ubuntu.com/resolute/current
      ubuntu_cloud_image:
        description: Ubuntu cloud image tarball name.
        required: true
        default: resolute-server-cloudimg-amd64.tar.gz
      firecracker_version:
        description: Firecracker release version.
        required: true
        default: v1.14.3
      kernel_version:
        description: Linux kernel version to build.
        required: true
        default: "7.0"
      kernel_source_url:
        description: Linux kernel source tarball URL.
        required: true
        default: https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.tar.xz
      kernel_source_sha256:
        description: Linux kernel source tarball SHA-256.
        required: true
        default: bb7f6d80b387c757b7d14bb93028fcb90f793c5c0d367736ee815a100b3891f0
      kernel_config_url:
        description: Firecracker guest kernel config URL.
        required: true
        default: https://raw.githubusercontent.com/firecracker-microvm/firecracker/86a2559b26a4b9a05405aeaa58bab0f7261d71bc/resources/guest_configs/microvm-kernel-ci-x86_64-6.1.config
      zstd_level:
        description: zstd compression level for rootfs.ext4.zst.
        required: true
        default: "10"
      overwrite_release:
        description: Delete an existing release/tag with the same version before publishing.
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build and publish image bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      VERSION: ${{ inputs.version }}
      OUT_DIR: dist/${{ inputs.version }}
      UBUNTU_CLOUD_BASE_URL: ${{ inputs.ubuntu_cloud_base_url }}
      UBUNTU_CLOUD_IMAGE: ${{ inputs.ubuntu_cloud_image }}
      FIRECRACKER_VERSION: ${{ inputs.firecracker_version }}
      KERNEL_OUT_DIR: dist/kernel-linux-${{ inputs.kernel_version }}
      ZSTD_LEVEL: ${{ inputs.zstd_level }}
      YEET_KERNEL_VERSION: ${{ inputs.kernel_version }}
      YEET_KERNEL_SOURCE_URL: ${{ inputs.kernel_source_url }}
      YEET_KERNEL_SOURCE_SHA256: ${{ inputs.kernel_source_sha256 }}
      YEET_KERNEL_CONFIG_URL: ${{ inputs.kernel_config_url }}
      YEET_KERNEL_WORK_DIR: ${{ github.workspace }}/.kernel-build-work
      YEET_VM_IMAGE_VERSION: ${{ inputs.version }}
      YEET_VM_IMAGE_PROFILE: fast
      YEET_VM_IMAGE_WORK_DIR: ${{ github.workspace }}/.build-work
      YEET_VM_INIT_BINARY: ${{ github.workspace }}/yeet-src/guest/yeet-init/target/x86_64-unknown-linux-musl/release/yeet-init
      YEET_VM_GHOSTTY_TERMINFO: ${{ github.workspace }}/assets/xterm-ghostty.terminfo
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout yeet source
        uses: actions/checkout@v4
        with:
          repository: yeetrun/yeet
          ref: ${{ inputs.yeet_ref }}
          path: yeet-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            dwarves \
            e2fsprogs \
            file \
            flex \
            jq \
            libelf-dev \
            libssl-dev \
            musl-tools \
            ncurses-bin \
            xz-utils \
            zstd

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build yeet init
        run: |
          cd yeet-src
          "$HOME/.local/bin/mise" install
          "$HOME/.local/bin/mise" run guest:init:build
          test -x "$YEET_VM_INIT_BINARY"

      - name: Build yeet-managed kernel
        run: |
          scripts/build-linux-kernel.sh "$KERNEL_OUT_DIR"

      - name: Build image bundle
        run: |
          sudo env \
            FIRECRACKER_VERSION="$FIRECRACKER_VERSION" \
            UBUNTU_CLOUD_BASE_URL="$UBUNTU_CLOUD_BASE_URL" \
            UBUNTU_CLOUD_IMAGE="$UBUNTU_CLOUD_IMAGE" \
            YEET_VM_IMAGE_PROFILE="$YEET_VM_IMAGE_PROFILE" \
            YEET_VM_IMAGE_VERSION="$YEET_VM_IMAGE_VERSION" \
            YEET_VM_IMAGE_WORK_DIR="$YEET_VM_IMAGE_WORK_DIR" \
            YEET_VM_GHOSTTY_TERMINFO="$YEET_VM_GHOSTTY_TERMINFO" \
            YEET_VM_INIT_PATH="$YEET_VM_INIT_BINARY" \
            YEET_VM_KERNEL_PATH="$GITHUB_WORKSPACE/$KERNEL_OUT_DIR/vmlinux" \
            YEET_VM_KERNEL_VERSION="linux-${YEET_KERNEL_VERSION}-yeet" \
            ZSTD_LEVEL="$ZSTD_LEVEL" \
            scripts/build-ubuntu-26.04.sh "$OUT_DIR"
          sudo chown -R "$USER:$USER" "$OUT_DIR"

      - name: Verify bundle
        run: |
          set -euo pipefail
          for asset in manifest.json vmlinux rootfs.ext4.zst firecracker kernel.config checksums.txt; do
            test -s "$OUT_DIR/$asset"
          done
          if [ -e "$OUT_DIR/initrd.img" ]; then
            echo "fast image bundle must not include initrd.img" >&2
            exit 1
          fi
          (
            cd "$OUT_DIR"
            sha256sum -c checksums.txt
          )
          check_manifest_checksum() {
            local asset="$1"
            local want
            local got
            want="$(jq -r --arg asset "$asset" '.checksums[$asset] // empty' "$OUT_DIR/manifest.json")"
            if [ -z "$want" ]; then
              echo "manifest missing checksum for $asset" >&2
              exit 1
            fi
            got="$(sha256sum "$OUT_DIR/$asset" | awk '{ print $1 }')"
            if [ "$got" != "$want" ]; then
              echo "manifest checksum mismatch for $asset: got $got, want $want" >&2
              exit 1
            fi
          }
          check_manifest_checksum vmlinux
          check_manifest_checksum rootfs.ext4.zst
          check_manifest_checksum firecracker
          jq -e '
            .image_profile == "fast" and
            .kernel_policy == "yeet-managed" and
            .snap_support == false and
            (.initrd | not) and
            .guest_init == "/usr/local/lib/yeet-vm/yeet-init" and
            (.guest_init_sha256 | test("^[0-9a-f]{64}$")) and
            .kernel == "vmlinux" and
            .rootfs == "rootfs.ext4.zst" and
            .provenance.kernel_source == "yeet-managed"
          ' "$OUT_DIR/manifest.json"
          grep -q '^# CONFIG_MODULES is not set$' "$OUT_DIR/kernel.config"
          grep -q '^CONFIG_VIRTIO_MMIO=y$' "$OUT_DIR/kernel.config"
          grep -q '^CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y$' "$OUT_DIR/kernel.config"
          grep -q '^CONFIG_VIRTIO_BLK=y$' "$OUT_DIR/kernel.config"
          grep -q '^CONFIG_VIRTIO_NET=y$' "$OUT_DIR/kernel.config"
          grep -q '^CONFIG_EXT4_FS=y$' "$OUT_DIR/kernel.config"
          grep -q '^CONFIG_IP_PNP=y$' "$OUT_DIR/kernel.config"
          grep -q '^CONFIG_IP_PNP_DHCP=y$' "$OUT_DIR/kernel.config"
          for config in \
            CONFIG_TUN \
            CONFIG_IPV6 \
            CONFIG_IPV6_MULTIPLE_TABLES \
            CONFIG_NETFILTER \
            CONFIG_NETFILTER_ADVANCED \
            CONFIG_NETFILTER_XTABLES \
            CONFIG_NF_CONNTRACK \
            CONFIG_NF_CONNTRACK_MARK \
            CONFIG_NF_NAT \
            CONFIG_NF_NAT_MASQUERADE \
            CONFIG_NF_TABLES \
            CONFIG_NF_TABLES_IPV4 \
            CONFIG_NF_TABLES_IPV6 \
            CONFIG_NF_TABLES_INET \
            CONFIG_NFT_CT \
            CONFIG_NFT_NAT \
            CONFIG_NFT_MASQ \
            CONFIG_NFT_REJECT \
            CONFIG_NFT_REJECT_INET \
            CONFIG_NFT_COMPAT \
            CONFIG_NETFILTER_XT_TARGET_CONNMARK \
            CONFIG_NETFILTER_XT_TARGET_MASQUERADE \
            CONFIG_NETFILTER_XT_TARGET_MARK \
            CONFIG_NETFILTER_XT_NAT \
            CONFIG_NETFILTER_XT_MATCH_CONNMARK \
            CONFIG_NETFILTER_XT_MATCH_MARK \
            CONFIG_NETFILTER_XT_MATCH_COMMENT \
            CONFIG_NETFILTER_XT_MATCH_CONNTRACK \
            CONFIG_NETFILTER_XT_MATCH_ADDRTYPE \
            CONFIG_IP6_NF_IPTABLES \
            CONFIG_IP6_NF_FILTER \
            CONFIG_IP6_NF_MANGLE \
            CONFIG_IP6_NF_NAT \
            CONFIG_IP6_NF_TARGET_MASQUERADE
          do
            grep -q "^${config}=y$" "$OUT_DIR/kernel.config"
          done
          zstd -d -f --no-progress -o "$RUNNER_TEMP/rootfs.ext4" "$OUT_DIR/rootfs.ext4.zst"
          debugfs -R 'stat /usr/local/lib/yeet-vm/yeet-init' "$RUNNER_TEMP/rootfs.ext4" >/dev/null
          debugfs -R 'stat /usr/share/doc/yeet-vm-image/init.md' "$RUNNER_TEMP/rootfs.ext4" >/dev/null
          debugfs -R 'stat /etc/terminfo/x/xterm-ghostty' "$RUNNER_TEMP/rootfs.ext4" >/dev/null
          debugfs -R 'stat /etc/sysctl.d/99-yeet-vm-router.conf' "$RUNNER_TEMP/rootfs.ext4" >/dev/null
          debugfs -R 'stat /etc/tmpfiles.d/yeet-vm-tun.conf' "$RUNNER_TEMP/rootfs.ext4" >/dev/null
          debugfs -R "dump -p /usr/local/lib/yeet-vm/yeet-init $RUNNER_TEMP/yeet-init" "$RUNNER_TEMP/rootfs.ext4" >/dev/null
          debugfs_cat() {
            debugfs -R "cat $1" "$RUNNER_TEMP/rootfs.ext4" 2>/dev/null || true
          }
          assert_unit_masked() {
            local unit="$1"
            local link
            link="$(debugfs -R "stat /etc/systemd/system/$unit" "$RUNNER_TEMP/rootfs.ext4" 2>/dev/null | awk -F': ' '/Fast link dest:/ { gsub(/^"|"$/, "", $2); print $2; exit }')"
            if [ "$link" != "/dev/null" ]; then
              echo "expected $unit to be masked to /dev/null, got ${link:-missing}" >&2
              exit 1
            fi
          }
          assert_symlink_target() {
            local path="$1"
            local target="$2"
            local link
            link="$(debugfs -R "stat $path" "$RUNNER_TEMP/rootfs.ext4" 2>/dev/null | awk -F': ' '/Fast link dest:/ { gsub(/^"|"$/, "", $2); print $2; exit }')"
            if [ "$link" != "$target" ]; then
              echo "expected $path to point to $target, got ${link:-missing}" >&2
              exit 1
            fi
          }
          assert_package_not_installed() {
            local package="$1"
            if debugfs_cat "/var/lib/dpkg/status" | awk -v pkg="$package" '
              $1 == "Package:" { package = $2 }
              $1 == "Status:" && package == pkg && $0 ~ /install ok installed/ { found = 1 }
              END { exit found ? 0 : 1 }
            '; then
              echo "expected package $package to be absent from fast image" >&2
              exit 1
            fi
          }
          assert_package_installed() {
            local package="$1"
            if ! debugfs_cat "/var/lib/dpkg/status" | awk -v pkg="$package" '
              $1 == "Package:" { package = $2 }
              $1 == "Status:" && package == pkg && $0 ~ /install ok installed/ { found = 1 }
              END { exit found ? 0 : 1 }
            '; then
              echo "expected package $package to be installed in fast image" >&2
              exit 1
            fi
          }
          assert_package_installed iptables
          assert_package_installed nftables
          assert_package_not_installed netplan.io
          assert_package_not_installed networkd-dispatcher
          assert_package_not_installed chrony
          assert_package_not_installed sysstat
          assert_package_not_installed fwupd
          assert_package_not_installed fwupd-signed
          assert_package_not_installed update-notifier-common
          assert_package_not_installed update-manager-core
          assert_package_not_installed xfsprogs
          assert_symlink_target /usr/sbin bin
          assert_symlink_target /sbin usr/bin
          assert_unit_masked netplan-configure.service
          assert_unit_masked networkd-dispatcher.service
          assert_unit_masked sysstat.service
          assert_unit_masked e2scrub_reap.service
          assert_unit_masked fwupd.service
          assert_unit_masked fwupd-refresh.service
          assert_unit_masked fwupd-refresh.timer
          assert_unit_masked update-notifier-download.service
          assert_unit_masked update-notifier-download.timer
          assert_unit_masked update-notifier-motd.service
          assert_unit_masked update-notifier-motd.timer
          assert_unit_masked xfs_scrub_all.service
          assert_unit_masked xfs_scrub_all.timer
          assert_unit_masked proc-sys-fs-binfmt_misc.automount
          assert_unit_masked proc-sys-fs-binfmt_misc.mount
          assert_unit_masked ldconfig.service
          assert_unit_masked keyboard-setup.service
          assert_unit_masked systemd-modules-load.service
          assert_unit_masked modprobe@.service
          assert_unit_masked modprobe@configfs.service
          assert_unit_masked modprobe@drm.service
          assert_unit_masked modprobe@efi_pstore.service
          assert_unit_masked modprobe@fuse.service
          debugfs_cat /etc/sysctl.d/99-yeet-vm-router.conf | grep -q '^net.ipv4.ip_forward = 1$'
          debugfs_cat /etc/sysctl.d/99-yeet-vm-router.conf | grep -q '^net.ipv6.conf.all.forwarding = 1$'
          debugfs_cat /etc/tmpfiles.d/yeet-vm-tun.conf | grep -q '^c /dev/net/tun 0666 root root 10:200$'
          expected_guest_init_sha="$(sha256sum "$YEET_VM_INIT_BINARY" | awk '{ print $1 }')"
          embedded_guest_init_sha="$(sha256sum "$RUNNER_TEMP/yeet-init" | awk '{ print $1 }')"
          manifest_guest_init_sha="$(jq -r '.guest_init_sha256' "$OUT_DIR/manifest.json")"
          if [ "$manifest_guest_init_sha" != "$expected_guest_init_sha" ] || [ "$manifest_guest_init_sha" != "$embedded_guest_init_sha" ]; then
            echo "guest_init_sha256 mismatch: manifest=$manifest_guest_init_sha build=$expected_guest_init_sha embedded=$embedded_guest_init_sha" >&2
            exit 1
          fi
          jq . "$OUT_DIR/manifest.json"

      - name: Prepare release notes
        run: |
          set -euo pipefail
          kernel_version="$(jq -r '.kernel_version' "$OUT_DIR/manifest.json")"
          ubuntu_url="$(jq -r '.provenance.ubuntu_cloud_image_url' "$OUT_DIR/manifest.json")"
          firecracker_version="$(jq -r '.provenance.firecracker_version' "$OUT_DIR/manifest.json")"
          cat >"$OUT_DIR/release-notes.md" <<EOF
          Experimental yeet Ubuntu 26.04 amd64 VM image bundle.

          - Version: \`$VERSION\`
          - Kernel: \`$kernel_version\`
          - Profile: fast, no initrd, no snap support, includes yeet-init
          - Ubuntu source image: <$ubuntu_url>
          - Firecracker: \`$firecracker_version\`

          See \`manifest.json\` for full checksums and provenance.
          EOF

      - name: Check release target
        run: |
          set -euo pipefail
          overwrite="${{ inputs.overwrite_release }}"
          release_exists=0
          tag_exists=0
          if gh release view "$VERSION" >/dev/null 2>&1; then
            release_exists=1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            tag_exists=1
          fi
          if [ "$release_exists" -eq 0 ] && [ "$tag_exists" -eq 0 ]; then
            exit 0
          fi
          if [ "$overwrite" != "true" ]; then
            echo "Release or tag $VERSION already exists. Re-run with overwrite_release=true to replace it." >&2
            exit 1
          fi
          if [ "$release_exists" -eq 1 ]; then
            gh release delete "$VERSION" --cleanup-tag --yes
          elif [ "$tag_exists" -eq 1 ]; then
            git push origin ":refs/tags/$VERSION"
          fi

      - name: Publish release
        run: |
          gh release create "$VERSION" \
            "$OUT_DIR/manifest.json" \
            "$OUT_DIR/vmlinux" \
            "$OUT_DIR/rootfs.ext4.zst" \
            "$OUT_DIR/firecracker" \
            "$OUT_DIR/kernel.config" \
            "$OUT_DIR/checksums.txt" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --notes-file "$OUT_DIR/release-notes.md"
