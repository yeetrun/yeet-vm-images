name: Build Ubuntu 26.04 guest base

on:
  workflow_dispatch:
    inputs:
      guest_base_id:
        description: Immutable guest base ID, for example guest-ubuntu-26.04-amd64-v1.
        required: true
      yeet_ref:
        description: yeet repository ref used to build guest binaries.
        required: true
        default: main
      kernel_release:
        description: Immutable kernel release installed as the default guest selector.
        required: true
      kernel_manifest_sha256:
        description: SHA-256 of the immutable kernel manifest.
        required: true
      zstd_level:
        description: zstd compression level for rootfs.ext4.zst.
        required: true
        default: "10"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build and publish Ubuntu guest base
    if: ${{ github.repository == 'yeetrun/yeet-vm-images' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    environment: vm-component-release
    env:
      GUEST_BASE_ID: ${{ inputs.guest_base_id }}
      KERNEL_RELEASE: ${{ inputs.kernel_release }}
      KERNEL_MANIFEST_SHA256: ${{ inputs.kernel_manifest_sha256 }}
      OUT_DIR: dist/${{ inputs.guest_base_id }}
      UBUNTU_CLOUD_BASE_URL: https://cloud-images.ubuntu.com/resolute/current
      UBUNTU_CLOUD_IMAGE: resolute-server-cloudimg-amd64.tar.gz
      ZSTD_LEVEL: ${{ inputs.zstd_level }}
      YEET_VM_IMAGE_PROFILE: fast
      YEET_VM_IMAGE_WORK_DIR: ${{ github.workspace }}/.build-work
      YEET_VM_INIT_BINARY: ${{ github.workspace }}/yeet-src/guest/yeet-init/target/x86_64-unknown-linux-musl/release/yeet-init
      YEET_VM_AGENT_BINARY: ${{ github.workspace }}/yeet-src/guest/yeet-agent/target/x86_64-unknown-linux-musl/release/yeet-agent
      YEET_VM_GHOSTTY_TERMINFO: ${{ github.workspace }}/assets/xterm-ghostty.terminfo
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate immutable component inputs
        run: |
          set -euo pipefail
          [[ "$GUEST_BASE_ID" =~ ^guest-ubuntu-26[.]04-amd64-v[1-9][0-9]*$ ]]
          [[ "$KERNEL_RELEASE" =~ ^kernel-linux-[0-9]+[.][0-9]+([.][0-9]+)*-yeet-v[1-9][0-9]*$ ]]
          [[ "$KERNEL_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]]
          jq -e --arg release "$KERNEL_RELEASE" --arg manifest "$KERNEL_MANIFEST_SHA256" '
            any(.kernels[]; .kernel_id == $release and .manifest_sha256 == $manifest) and
            .channels.amd64.stable == {kernel_id: $release, manifest_sha256: $manifest}
          ' kernel-catalog.json >/dev/null
          jq -e --arg release "$KERNEL_RELEASE" --arg manifest "$KERNEL_MANIFEST_SHA256" '
            .release_id == $release and
            .manifest_sha256 == $manifest and
            .selector_schema_version == 2
          ' kernel-packages/catalog.json >/dev/null

          manifest="$RUNNER_TEMP/kernel-manifest.json"
          curl -fsSL --retry 3 \
            -o "$manifest" \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${KERNEL_RELEASE}/kernel-manifest.json"
          [ "$(sha256sum "$manifest" | awk '{ print $1 }')" = "$KERNEL_MANIFEST_SHA256" ]
          jq -e --arg release "$KERNEL_RELEASE" '
            .schema_version == 1 and
            .kernel_id == $release and
            .architecture == "amd64" and
            .guest_packages.selector_schema_version == 2 and
            .guest_packages.release_id == $release
          ' "$manifest" >/dev/null
          echo "KERNEL_VERSION=$(jq -r '.upstream_version' "$manifest")" >>"$GITHUB_ENV"

      - name: Checkout yeet source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: yeetrun/yeet
          ref: ${{ inputs.yeet_ref }}
          path: yeet-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            e2fsprogs \
            file \
            jq \
            musl-tools \
            ncurses-bin \
            zstd

      - name: Verify catalogs
        run: scripts/verify-component-catalogs.sh

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Build yeet guest binaries
        run: |
          set -euo pipefail
          cd yeet-src
          "$HOME/.local/bin/mise" install
          "$HOME/.local/bin/mise" run guest:init:build
          "$HOME/.local/bin/mise" run guest:agent:build
          echo "YEET_SOURCE_REV=$(git rev-parse HEAD)" >>"$GITHUB_ENV"
          test -x "$YEET_VM_INIT_BINARY"
          test -x "$YEET_VM_AGENT_BINARY"

      - name: Build guest base
        run: |
          sudo env \
            UBUNTU_CLOUD_BASE_URL="$UBUNTU_CLOUD_BASE_URL" \
            UBUNTU_CLOUD_IMAGE="$UBUNTU_CLOUD_IMAGE" \
            YEET_VM_IMAGE_PROFILE="$YEET_VM_IMAGE_PROFILE" \
            YEET_VM_GUEST_BASE_ID="$GUEST_BASE_ID" \
            YEET_VM_IMAGE_WORK_DIR="$YEET_VM_IMAGE_WORK_DIR" \
            YEET_VM_GHOSTTY_TERMINFO="$YEET_VM_GHOSTTY_TERMINFO" \
            YEET_VM_INIT_PATH="$YEET_VM_INIT_BINARY" \
            YEET_VM_AGENT_PATH="$YEET_VM_AGENT_BINARY" \
            YEET_VM_KERNEL_RELEASE_ID="$KERNEL_RELEASE" \
            YEET_VM_KERNEL_MANIFEST_SHA256="$KERNEL_MANIFEST_SHA256" \
            YEET_VM_IMAGES_SOURCE_REV="$GITHUB_SHA" \
            YEET_VM_WORKFLOW_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            YEET_SOURCE_REV="$YEET_SOURCE_REV" \
            ZSTD_LEVEL="$ZSTD_LEVEL" \
            scripts/build-ubuntu-26.04.sh "$OUT_DIR"
          sudo chown -R "$USER:$USER" "$OUT_DIR"

      - name: Verify guest-base boundary
        run: |
          set -euo pipefail
          actual="$(find "$OUT_DIR" -mindepth 1 -maxdepth 1 -exec basename {} \; | LC_ALL=C sort)"
          expected="$(printf '%s\n' checksums.txt guest-manifest.json provenance.json rootfs.ext4.zst | LC_ALL=C sort)"
          if [ "$actual" != "$expected" ]; then
            echo "guest-base release staging contains unexpected host artifacts" >&2
            printf '%s\n' "$actual" >&2
            exit 1
          fi
          (
            cd "$OUT_DIR"
            sha256sum --check --strict checksums.txt
          )
          jq -e --arg id "$GUEST_BASE_ID" --arg commit "$GITHUB_SHA" '
            .schema_version == 1 and
            .guest_base_id == $id and
            .os == "ubuntu" and
            .os_version == "26.04" and
            .architecture == "amd64" and
            .default_kernel_channel == "stable" and
            (.rootfs.sha256 | test("^[0-9a-f]{64}$")) and
            (.rootfs.uncompressed_bytes | type == "number" and floor == . and . > 0) and
            .provenance.source_commit == $commit
          ' "$OUT_DIR/guest-manifest.json" >/dev/null
          jq -e --arg id "$GUEST_BASE_ID" --arg release "$KERNEL_RELEASE" --arg manifest "$KERNEL_MANIFEST_SHA256" '
            .schema_version == 1 and
            .guest_base_id == $id and
            .kernel_request == {release_id: $release, manifest_sha256: $manifest}
          ' "$OUT_DIR/provenance.json" >/dev/null

          zstd -d -f --no-progress -o "$RUNNER_TEMP/rootfs.ext4" "$OUT_DIR/rootfs.ext4.zst"
          rootfs_features="$(dumpe2fs -h "$RUNNER_TEMP/rootfs.ext4" 2>/dev/null | awk -F: '/Filesystem features/ { print $2; exit }')"
          if printf '%s\n' "$rootfs_features" | grep -Eq '(^|[[:space:]])orphan_file($|[[:space:]])|(^|[[:space:]])FEATURE_'; then
            echo "rootfs ext4 features are not compatible with common LTS host tooling: $rootfs_features" >&2
            exit 1
          fi
          for path in \
            /usr/local/lib/yeet-vm/yeet-init \
            /usr/local/lib/yeet-vm/yeet-agent \
            /etc/systemd/system/yeet-agent.service \
            /etc/apt/sources.list.d/yeet-vm-kernel.sources \
            /etc/yeet-vm/kernel/selected.json
          do
            debugfs -R "stat $path" "$RUNNER_TEMP/rootfs.ext4" >/dev/null
          done
          debugfs -R "cat /etc/yeet-vm/kernel/selected.json" "$RUNNER_TEMP/rootfs.ext4" 2>/dev/null |
            jq -e --arg release "$KERNEL_RELEASE" --arg manifest "$KERNEL_MANIFEST_SHA256" '
              .schema_version == 2 and
              .release_id == $release and
              .manifest_sha256 == $manifest and
              (.sha256.vmlinux | test("^[0-9a-f]{64}$")) and
              (.sha256["kernel.config"] | test("^[0-9a-f]{64}$"))
            ' >/dev/null

      - name: Prepare release notes
        run: |
          cat >"$RUNNER_TEMP/guest-release-notes.md" <<EOF
          Experimental yeet Ubuntu 26.04 amd64 guest base.

          - Guest base: \`$GUEST_BASE_ID\`
          - Default kernel release: \`$KERNEL_RELEASE\`
          - Root filesystem only; no host Firecracker, jailer, or boot kernel artifacts

          See \`guest-manifest.json\` and \`provenance.json\` for immutable identities and checksums.
          EOF

      - name: Check immutable release target
        id: release_target
        run: |
          set -euo pipefail
          release_exists=0
          tag_exists=0
          gh release view "$GUEST_BASE_ID" >/dev/null 2>&1 && release_exists=1
          git ls-remote --exit-code --tags origin "refs/tags/$GUEST_BASE_ID" >/dev/null 2>&1 && tag_exists=1
          if [ "$release_exists" -eq 0 ] && [ "$tag_exists" -eq 0 ]; then
            echo "published=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$release_exists" -ne 1 ] || [ "$tag_exists" -ne 1 ]; then
            echo "guest-base release/tag state is incomplete for $GUEST_BASE_ID" >&2
            exit 1
          fi
          published="$RUNNER_TEMP/published-guest-manifest.json"
          gh release download "$GUEST_BASE_ID" --pattern guest-manifest.json --output "$published"
          expected_sha="$(sha256sum "$OUT_DIR/guest-manifest.json" | awk '{ print $1 }')"
          published_sha="$(sha256sum "$published" | awk '{ print $1 }')"
          [ "$published_sha" = "$expected_sha" ] || {
            echo "immutable guest-base release has a different manifest digest" >&2
            exit 1
          }
          echo "published=true" >>"$GITHUB_OUTPUT"

      - name: Publish immutable guest base
        if: ${{ steps.release_target.outputs.published != 'true' }}
        run: |
          scripts/publish-guest-base-assets.sh \
            "$GUEST_BASE_ID" \
            "$GUEST_BASE_ID" \
            "$GITHUB_SHA" \
            "$RUNNER_TEMP/guest-release-notes.md" \
            "$OUT_DIR"

      - name: Re-download and verify published guest base
        run: |
          set -euo pipefail
          release_json="$RUNNER_TEMP/guest-release.json"
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GUEST_BASE_ID}" >"$release_json"
          jq -e --arg tag "$GUEST_BASE_ID" '
            .tag_name == $tag and
            .draft == false and
            .prerelease == false and
            .immutable == true and
            ([.assets[].name] | sort) == ["checksums.txt", "guest-manifest.json", "provenance.json", "rootfs.ext4.zst"] and
            all(.assets[]; .state == "uploaded" and (.digest | test("^sha256:[0-9a-f]{64}$")))
          ' "$release_json" >/dev/null
          published_dir="$RUNNER_TEMP/published-guest-base"
          mkdir -p "$published_dir"
          gh release download "$GUEST_BASE_ID" --dir "$published_dir"
          for asset in checksums.txt guest-manifest.json provenance.json rootfs.ext4.zst; do
            cmp "$OUT_DIR/$asset" "$published_dir/$asset"
          done
          (
            cd "$published_dir"
            sha256sum --check --strict checksums.txt
          )

  open-candidate-pr:
    name: Open Ubuntu guest candidate PR
    needs: build
    runs-on: ubuntu-24.04
    environment: firecracker-runtime-promotion
    permissions:
      contents: read
    steps:
      - name: Checkout the exact build commit without credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install catalog verification dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq pipx python3
          pipx install check-jsonschema==0.37.4
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Prepare candidate catalog change from the immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          GUEST_BASE_ID: ${{ inputs.guest_base_id }}
        run: |
          set -euo pipefail
          release_json="$RUNNER_TEMP/guest-release.json"
          manifest="$RUNNER_TEMP/guest-manifest.json"
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GUEST_BASE_ID}" >"$release_json"
          jq -e --arg tag "$GUEST_BASE_ID" '
            .tag_name == $tag and .draft == false and .prerelease == false and .immutable == true
          ' "$release_json" >/dev/null
          gh release download "$GUEST_BASE_ID" --pattern guest-manifest.json --output "$manifest"
          manifest_sha256="$(sha256sum "$manifest" | awk '{ print $1 }')"
          jq -e --arg digest "sha256:$manifest_sha256" '
            any(.assets[]; .name == "guest-manifest.json" and .digest == $digest)
          ' "$release_json" >/dev/null
          scripts/update-guest-catalog.sh \
            --manifest "$manifest" \
            --manifest-sha256 "$manifest_sha256" \
            --channel candidate \
            --catalog-in guest-catalog.json \
            --catalog-out "$RUNNER_TEMP/guest-catalog.json"
          mv "$RUNNER_TEMP/guest-catalog.json" guest-catalog.json
          scripts/verify-component-catalogs.sh
          [ "$(git diff --name-only)" = guest-catalog.json ]

      - name: Mint repository-scoped catalog token
        id: catalog-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.YEET_RUNTIME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.YEET_RUNTIME_GITHUB_APP_PRIVATE_KEY }}
          owner: yeetrun
          repositories: yeet-vm-images
          permission-contents: write
          permission-pull-requests: write

      - name: Commit, push, and open the candidate PR
        env:
          GH_TOKEN: ${{ steps.catalog-app-token.outputs.token }}
          GUEST_BASE_ID: ${{ inputs.guest_base_id }}
        run: |
          set -euo pipefail
          unset GITHUB_TOKEN
          branch="automation/$GUEST_BASE_ID"
          if git ls-remote --exit-code --heads origin "refs/heads/$branch" >/dev/null 2>&1; then
            echo "Candidate branch already exists: $branch" >&2
            exit 1
          fi
          git switch -c "$branch"
          git config user.name yeet-component-promotion[bot]
          git config user.email 0+yeet-component-promotion[bot]@users.noreply.github.com
          git add -- guest-catalog.json
          git commit -m "catalog add $GUEST_BASE_ID candidate"
          gh auth setup-git
          git push origin "HEAD:refs/heads/$branch"
          gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$branch" \
            --title "Add $GUEST_BASE_ID as candidate" \
            --body "Adds the independently published Ubuntu guest base to the candidate channel. Stable promotion remains separate until live validation passes."
