name: Sync latest stable Linux kernel VM images

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Build even if latest manifests already use the detected kernel.
        required: true
        type: boolean
        default: false
      yeet_ref:
        description: yeet repository ref used to build guest tools.
        required: true
        default: main

permissions:
  contents: write

jobs:
  detect:
    name: Detect latest stable kernel
    runs-on: ubuntu-24.04
    outputs:
      kernel_version: ${{ steps.kernel.outputs.kernel_version }}
      kernel_source_url: ${{ steps.kernel.outputs.kernel_source_url }}
      kernel_source_sha256: ${{ steps.kernel.outputs.kernel_source_sha256 }}
      ubuntu_build: ${{ steps.plan.outputs.ubuntu_build }}
      ubuntu_version: ${{ steps.plan.outputs.ubuntu_version }}
      ubuntu_image_revision: ${{ steps.plan.outputs.ubuntu_image_revision }}
      nixos_build: ${{ steps.plan.outputs.nixos_build }}
      nixos_version: ${{ steps.plan.outputs.nixos_version }}
      nixos_image_revision: ${{ steps.plan.outputs.nixos_image_revision }}
      package_image_release: ${{ steps.plan.outputs.package_image_release }}
      yeet_ref: ${{ steps.plan.outputs.yeet_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Resolve latest stable kernel
        id: kernel
        run: |
          set -euo pipefail

          kernel_info="$(scripts/resolve-latest-kernel.sh)"
          kernel_version="$(jq -r '.version' <<<"$kernel_info")"
          kernel_source_url="$(jq -r '.source_url' <<<"$kernel_info")"
          kernel_source_sha256="$(jq -r '.source_sha256' <<<"$kernel_info")"

          {
            echo "kernel_version=$kernel_version"
            echo "kernel_source_url=$kernel_source_url"
            echo "kernel_source_sha256=$kernel_source_sha256"
          } >>"$GITHUB_OUTPUT"

      - name: Download latest manifests
        run: |
          set -euo pipefail

          release_base="https://github.com/${GITHUB_REPOSITORY}/releases/download"
          curl -fsSL --retry 3 \
            -o "$RUNNER_TEMP/ubuntu-latest-manifest.json" \
            "$release_base/ubuntu-26.04-amd64-latest/manifest.json"
          curl -fsSL --retry 3 \
            -o "$RUNNER_TEMP/nixos-latest-manifest.json" \
            "$release_base/nixos-26.05-amd64-latest/manifest.json"

      - name: Plan image builds
        id: plan
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
          GH_TOKEN: ${{ github.token }}
          KERNEL_VERSION: ${{ steps.kernel.outputs.kernel_version }}
          YEET_REF: ${{ github.event.inputs.yeet_ref || 'main' }}
        run: |
          set -euo pipefail

          current_upstream_kernel() {
            local manifest="$1"
            jq -r '
              if (.upstream_kernel_version // "") != "" then
                .upstream_kernel_version
              else
                (.kernel_version // "" | sub("^linux-"; "") | sub("-yeet$"; ""))
              end
            ' "$manifest"
          }

          should_build() {
            local current_kernel="$1"
            if [ "$FORCE" = "true" ] || [ "$current_kernel" != "$KERNEL_VERSION" ]; then
              echo "true"
            else
              echo "false"
            fi
          }

          action_label() {
            local build="$1"
            if [ "$build" = "true" ] && [ "$FORCE" = "true" ]; then
              echo "build (forced)"
            elif [ "$build" = "true" ]; then
              echo "build"
            else
              echo "skip"
            fi
          }

          ubuntu_current_kernel="$(current_upstream_kernel "$RUNNER_TEMP/ubuntu-latest-manifest.json")"
          nixos_current_kernel="$(current_upstream_kernel "$RUNNER_TEMP/nixos-latest-manifest.json")"
          ubuntu_current_version="$(jq -r '.version' "$RUNNER_TEMP/ubuntu-latest-manifest.json")"
          ubuntu_build="$(should_build "$ubuntu_current_kernel")"
          nixos_build="$(should_build "$nixos_current_kernel")"

          ubuntu_next="$(scripts/next-image-version.sh ubuntu-26.04-amd64 "$KERNEL_VERSION")"
          ubuntu_version="$(jq -r '.version' <<<"$ubuntu_next")"
          ubuntu_image_revision="$(jq -r '.image_revision' <<<"$ubuntu_next")"

          nixos_next="$(scripts/next-image-version.sh nixos-26.05-amd64 "$KERNEL_VERSION")"
          nixos_version="$(jq -r '.version' <<<"$nixos_next")"
          nixos_image_revision="$(jq -r '.image_revision' <<<"$nixos_next")"

          package_image_release="$ubuntu_current_version"
          if [ "$ubuntu_build" = "true" ]; then
            package_image_release="$ubuntu_version"
          fi

          {
            echo "ubuntu_build=$ubuntu_build"
            echo "ubuntu_version=$ubuntu_version"
            echo "ubuntu_image_revision=$ubuntu_image_revision"
            echo "nixos_build=$nixos_build"
            echo "nixos_version=$nixos_version"
            echo "nixos_image_revision=$nixos_image_revision"
            echo "package_image_release=$package_image_release"
            echo "yeet_ref=$YEET_REF"
          } >>"$GITHUB_OUTPUT"

          {
            echo "## Latest Stable Kernel Sync"
            echo
            echo "- Detected kernel: \`$KERNEL_VERSION\`"
            echo "- Force build: \`$FORCE\`"
            echo "- yeet ref: \`$YEET_REF\`"
            echo
            echo "| Image | Current upstream kernel | Action | Next version | Image revision |"
            echo "| --- | --- | --- | --- | --- |"
            echo "| Ubuntu 26.04 amd64 | \`${ubuntu_current_kernel:-unknown}\` | $(action_label "$ubuntu_build") | \`$ubuntu_version\` | \`$ubuntu_image_revision\` |"
            echo "| NixOS 26.05 amd64 | \`${nixos_current_kernel:-unknown}\` | $(action_label "$nixos_build") | \`$nixos_version\` | \`$nixos_image_revision\` |"
            echo
            echo "- Kernel package source image release: \`$package_image_release\`"
          } >>"$GITHUB_STEP_SUMMARY"

  build-ubuntu:
    name: Build Ubuntu 26.04 latest stable kernel image
    needs: detect
    if: ${{ needs.detect.outputs.ubuntu_build == 'true' }}
    uses: ./.github/workflows/build-ubuntu-26.04.yml
    with:
      version: ${{ needs.detect.outputs.ubuntu_version }}
      yeet_ref: ${{ needs.detect.outputs.yeet_ref }}
      ubuntu_cloud_base_url: https://cloud-images.ubuntu.com/resolute/current
      ubuntu_cloud_image: resolute-server-cloudimg-amd64.tar.gz
      firecracker_version: v1.14.3
      kernel_version: ${{ needs.detect.outputs.kernel_version }}
      upstream_kernel_version: ${{ needs.detect.outputs.kernel_version }}
      image_revision: ${{ needs.detect.outputs.ubuntu_image_revision }}
      kernel_source_url: ${{ needs.detect.outputs.kernel_source_url }}
      kernel_source_sha256: ${{ needs.detect.outputs.kernel_source_sha256 }}
      kernel_config_url: https://raw.githubusercontent.com/firecracker-microvm/firecracker/86a2559b26a4b9a05405aeaa58bab0f7261d71bc/resources/guest_configs/microvm-kernel-ci-x86_64-6.1.config
      zstd_level: "10"
      overwrite_release: false
      publish_latest_alias: true
      latest_alias: ubuntu-26.04-amd64-latest
    secrets: inherit

  build-nixos:
    name: Build NixOS 26.05 latest stable kernel image
    needs: detect
    if: ${{ needs.detect.outputs.nixos_build == 'true' }}
    uses: ./.github/workflows/build-nixos-26.05.yml
    with:
      version: ${{ needs.detect.outputs.nixos_version }}
      yeet_ref: ${{ needs.detect.outputs.yeet_ref }}
      firecracker_version: v1.14.3
      kernel_version: ${{ needs.detect.outputs.kernel_version }}
      upstream_kernel_version: ${{ needs.detect.outputs.kernel_version }}
      image_revision: ${{ needs.detect.outputs.nixos_image_revision }}
      kernel_source_url: ${{ needs.detect.outputs.kernel_source_url }}
      kernel_source_sha256: ${{ needs.detect.outputs.kernel_source_sha256 }}
      kernel_config_url: https://raw.githubusercontent.com/firecracker-microvm/firecracker/86a2559b26a4b9a05405aeaa58bab0f7261d71bc/resources/guest_configs/microvm-kernel-ci-x86_64-6.1.config
      zstd_level: "10"
      overwrite_release: false
      publish_latest_alias: true
      latest_alias: nixos-26.05-amd64-latest
    secrets: inherit

  publish-kernel-packages:
    name: Publish kernel package sources
    needs:
      - detect
      - build-ubuntu
      - build-nixos
    if: >-
      ${{
        always() &&
        (needs.detect.outputs.ubuntu_build == 'true' || needs.detect.outputs.nixos_build == 'true') &&
        (needs.build-ubuntu.result == 'success' || needs.build-ubuntu.result == 'skipped') &&
        (needs.build-nixos.result == 'success' || needs.build-nixos.result == 'skipped')
      }}
    uses: ./.github/workflows/publish-kernel-packages.yml
    with:
      kernel_version: ${{ needs.detect.outputs.kernel_version }}
      image_release: ${{ needs.detect.outputs.package_image_release }}
    secrets: inherit
