name: Sync latest stable Linux kernel component

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Publish a new packaging revision for the detected stable kernel.
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  detect:
    name: Detect latest stable kernel
    runs-on: ubuntu-24.04
    outputs:
      kernel_version: ${{ steps.kernel.outputs.kernel_version }}
      kernel_source_url: ${{ steps.kernel.outputs.kernel_source_url }}
      kernel_source_sha256: ${{ steps.kernel.outputs.kernel_source_sha256 }}
      kernel_release: ${{ steps.plan.outputs.kernel_release }}
      kernel_release_build: ${{ steps.plan.outputs.kernel_release_build }}
      promotion_needed: ${{ steps.plan.outputs.promotion_needed }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Resolve latest stable kernel
        id: kernel
        run: |
          set -euo pipefail

          kernel_info="$(scripts/resolve-latest-kernel.sh)"
          {
            echo "kernel_version=$(jq -r '.version' <<<"$kernel_info")"
            echo "kernel_source_url=$(jq -r '.source_url' <<<"$kernel_info")"
            echo "kernel_source_sha256=$(jq -r '.source_sha256' <<<"$kernel_info")"
          } >>"$GITHUB_OUTPUT"

      - name: Plan kernel release and promotion
        id: plan
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
          GH_TOKEN: ${{ github.token }}
          KERNEL_VERSION: ${{ steps.kernel.outputs.kernel_version }}
        run: |
          set -euo pipefail

          release_info="$(scripts/resolve-kernel-release.sh "$KERNEL_VERSION")"
          current_release="$(jq -r '.current_release' <<<"$release_info")"
          next_release="$(jq -r '.next_release' <<<"$release_info")"
          kernel_release="$next_release"
          kernel_release_build="true"
          promotion_needed="true"

          if [ "$FORCE" != "true" ] && [ -n "$current_release" ]; then
            current_dir="$RUNNER_TEMP/current-kernel-release"
            if YEET_KERNEL_VERSION="$KERNEL_VERSION" \
              scripts/download-kernel-release.sh "$current_release" "$current_dir"; then
              kernel_release="$current_release"
              kernel_release_build="false"
              manifest_sha256="$(sha256sum "$current_dir/kernel-manifest.json" | awk '{ print $1 }')"
              if jq -e --arg release "$current_release" --arg manifest "$manifest_sha256" '
                any(.kernels[]; .kernel_id == $release and .manifest_sha256 == $manifest) and
                .channels.amd64.stable == {kernel_id: $release, manifest_sha256: $manifest}
              ' kernel-catalog.json >/dev/null; then
                promotion_needed="false"
              fi
            fi
          fi

          {
            echo "kernel_release=$kernel_release"
            echo "kernel_release_build=$kernel_release_build"
            echo "promotion_needed=$promotion_needed"
          } >>"$GITHUB_OUTPUT"

          {
            echo "## Latest Stable Kernel Component Sync"
            echo
            echo "- Detected upstream kernel: \`$KERNEL_VERSION\`"
            echo "- Immutable release: \`$kernel_release\`"
            echo "- Build required: \`$kernel_release_build\`"
            echo "- Catalog promotion required: \`$promotion_needed\`"
            echo "- Forced packaging revision: \`$FORCE\`"
          } >>"$GITHUB_STEP_SUMMARY"

  build-kernel:
    name: Build canonical kernel release
    needs: detect
    if: ${{ needs.detect.outputs.kernel_release_build == 'true' }}
    uses: ./.github/workflows/build-kernel.yml
    with:
      kernel_release: ${{ needs.detect.outputs.kernel_release }}
      kernel_version: ${{ needs.detect.outputs.kernel_version }}
      kernel_source_url: ${{ needs.detect.outputs.kernel_source_url }}
      kernel_source_sha256: ${{ needs.detect.outputs.kernel_source_sha256 }}
      kernel_config_url: https://raw.githubusercontent.com/firecracker-microvm/firecracker/86a2559b26a4b9a05405aeaa58bab0f7261d71bc/resources/guest_configs/microvm-kernel-ci-x86_64-6.1.config
      overwrite_release: false
    secrets: inherit

  publish-kernel-packages:
    name: Publish kernel package sources
    needs:
      - detect
      - build-kernel
    if: >-
      ${{
        always() &&
        needs.detect.outputs.promotion_needed == 'true' &&
        (needs.build-kernel.result == 'success' || needs.build-kernel.result == 'skipped')
      }}
    uses: ./.github/workflows/publish-kernel-packages.yml
    with:
      kernel_version: ${{ needs.detect.outputs.kernel_version }}
      kernel_release: ${{ needs.detect.outputs.kernel_release }}
    secrets: inherit

  promote-kernel-catalog:
    name: Open stable kernel catalog promotion PR
    needs:
      - detect
      - build-kernel
      - publish-kernel-packages
    if: >-
      ${{
        always() &&
        needs.detect.outputs.promotion_needed == 'true' &&
        (needs.build-kernel.result == 'success' || needs.build-kernel.result == 'skipped') &&
        needs.publish-kernel-packages.result == 'success'
      }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout current main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main

      - name: Download and verify immutable kernel release
        env:
          KERNEL_RELEASE: ${{ needs.detect.outputs.kernel_release }}
          KERNEL_VERSION: ${{ needs.detect.outputs.kernel_version }}
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/kernel-release"
          YEET_KERNEL_VERSION="$KERNEL_VERSION" \
            scripts/download-kernel-release.sh "$KERNEL_RELEASE" "$release_dir"
          manifest_sha256="$(sha256sum "$release_dir/kernel-manifest.json" | awk '{ print $1 }')"
          scripts/update-kernel-catalog.sh \
            --manifest "$release_dir/kernel-manifest.json" \
            --manifest-sha256 "$manifest_sha256" \
            --channel stable \
            --catalog-in kernel-catalog.json \
            --catalog-out "$RUNNER_TEMP/kernel-catalog.json"
          mv "$RUNNER_TEMP/kernel-catalog.json" kernel-catalog.json
          scripts/verify-component-catalogs.sh

      - name: Open catalog promotion PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/kernel-${{ needs.detect.outputs.kernel_release }}
          delete-branch: true
          commit-message: catalog promote ${{ needs.detect.outputs.kernel_release }}
          title: Promote ${{ needs.detect.outputs.kernel_release }}
          body: |
            Promotes the independently published kernel release after artifact and selector-package verification.

            This changes only `kernel-catalog.json`; guest-base catalogs and legacy image aliases are untouched.
          add-paths: kernel-catalog.json
