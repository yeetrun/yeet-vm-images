name: Build and publish Firecracker runtime candidate

on:
  schedule:
    - cron: "37 9 * * *"
  workflow_dispatch:
    inputs:
      upstream_version:
        description: Exact reviewed upstream version; empty discovers the newest stable release.
        required: false
        type: string
      allow_unsigned_tag:
        description: Permit a reviewed unsigned upstream tag for this run.
        required: false
        type: boolean
        default: false
      allow_signer_rotation:
        description: Permit a reviewed upstream signer rotation for this run.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: sync-latest-stable-firecracker
  cancel-in-progress: false

jobs:
  discover:
    name: Discover newest stable Firecracker release
    runs-on: ubuntu-24.04
    outputs:
      runtime_id: ${{ steps.candidate.outputs.runtime_id }}
      should_publish: ${{ steps.candidate.outputs.should_publish }}
      upstream_version: ${{ steps.candidate.outputs.upstream_version }}
    steps:
      - name: Checkout the discovery commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install discovery dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl git jq pipx python3
          pipx install check-jsonschema==0.37.4
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Compare stable upstream with immutable candidates
        id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_UPSTREAM_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.upstream_version || '' }}
        run: |
          set -euo pipefail
          report_discovery_failure() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ]; then
              {
                echo "### Stable Firecracker discovery failed"
                echo
                echo "Discovery failed. Inspect the failed step before retrying."
              } >>"$GITHUB_STEP_SUMMARY"
            fi
            exit "$status"
          }
          trap report_discovery_failure EXIT

          upstream_version="$REQUESTED_UPSTREAM_VERSION"
          if [ -n "$upstream_version" ]; then
            [[ "$upstream_version" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]] || {
              echo "Invalid requested upstream version: $upstream_version" >&2
              exit 1
            }
            scripts/resolve-firecracker-runtime-policy.py security/firecracker-runtime-policy.json "$upstream_version" >/dev/null
          else
            upstream="$(scripts/resolve-latest-firecracker.sh)"
            upstream_version="$(jq -er '.upstream_version' <<<"$upstream")"
          fi
          allocation="$(scripts/resolve-firecracker-runtime-release.sh "$upstream_version")"
          runtime_id="$(jq -er '.next_release' <<<"$allocation")"

          published_tags="$RUNNER_TEMP/firecracker-runtime-published-tags.txt"
          gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[] | select(.draft == false and .published_at != null) | .tag_name' >"$published_tags"
          published="$(scripts/resolve-firecracker-runtime-release.sh "$upstream_version" "$published_tags")"
          current_release="$(jq -er '.current_release' <<<"$published")"

          should_publish=true
          if [ -n "$current_release" ]; then
            scripts/verify-published-firecracker-runtime.sh "$current_release" >/dev/null
            should_publish=false
          fi
          {
            echo "runtime_id=$runtime_id"
            echo "upstream_version=$upstream_version"
            echo "should_publish=$should_publish"
          } >>"$GITHUB_OUTPUT"

          {
            echo "### Stable Firecracker discovery"
            echo
            echo "- Upstream: \`$upstream_version\`"
            if [ "$should_publish" = true ]; then
              echo "- Result: no immutable candidate exists; publication requested."
            else
              echo "- Result: Candidate already exists; no publication requested."
              echo "- Existing candidate: \`$current_release\`"
            fi
          } >>"$GITHUB_STEP_SUMMARY"
          trap - EXIT

  approve-runtime-overrides:
    needs: discover
    if: ${{ needs.discover.outputs.should_publish == 'true' && (inputs.allow_unsigned_tag || inputs.allow_signer_rotation) }}
    runs-on: ubuntu-24.04
    permissions: {}
    environment: firecracker-runtime-overrides
    steps:
      - name: Record override approval
        run: echo "Runtime source override approved by the protected environment." >>"$GITHUB_STEP_SUMMARY"

  publish-firecracker-runtime:
    needs: [discover, approve-runtime-overrides]
    if: ${{ always() && needs.discover.outputs.should_publish == 'true' && (needs.approve-runtime-overrides.result == 'success' || needs.approve-runtime-overrides.result == 'skipped') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment: firecracker-runtime-publish
    concurrency:
      group: firecracker-runtime-publish
      cancel-in-progress: false
    outputs:
      runtime_id: ${{ steps.publish.outputs.runtime_id }}
      manifest_url: ${{ steps.publish.outputs.manifest_url }}
      manifest_sha256: ${{ steps.publish.outputs.manifest_sha256 }}
      release_url: ${{ steps.publish.outputs.release_url }}

    steps:
      - name: Checkout the caller commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned verification dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl file git gnupg jq pipx python3
          pipx install check-jsonschema==0.37.4
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Resolve the next packaging revision
        id: revision
        env:
          REQUESTED_RUNTIME_ID: ${{ needs.discover.outputs.runtime_id }}
          UPSTREAM_VERSION: ${{ needs.discover.outputs.upstream_version }}
        run: |
          set -euo pipefail
          release_info="$(scripts/resolve-firecracker-runtime-release.sh "$UPSTREAM_VERSION")"
          runtime_id="$(jq -er '.next_release' <<<"$release_info")"
          if [ "$REQUESTED_RUNTIME_ID" != "$runtime_id" ]; then
            echo "Requested runtime ID $REQUESTED_RUNTIME_ID is not the next immutable packaging revision $runtime_id" >&2
            exit 1
          fi
          echo "runtime_id=$runtime_id" >>"$GITHUB_OUTPUT"

      - name: Build the verified runtime pair
        env:
          ALLOW_SIGNER_ROTATION: ${{ inputs.allow_signer_rotation }}
          ALLOW_UNSIGNED_TAG: ${{ inputs.allow_unsigned_tag }}
          RUNTIME_ID: ${{ steps.revision.outputs.runtime_id }}
          UPSTREAM_VERSION: ${{ needs.discover.outputs.upstream_version }}
        run: |
          set -euo pipefail
          args=(
            --upstream-version "$UPSTREAM_VERSION"
            --runtime-id "$RUNTIME_ID"
            --out dist/firecracker-runtime
          )
          if [ "$ALLOW_UNSIGNED_TAG" = true ]; then args+=(--allow-unsigned-tag); fi
          if [ "$ALLOW_SIGNER_ROTATION" = true ]; then args+=(--allow-signer-rotation); fi
          mkdir -p dist
          scripts/build-firecracker-runtime.sh "${args[@]}"

      - name: Verify the exact candidate bundle
        env:
          RUNTIME_ID: ${{ steps.revision.outputs.runtime_id }}
        run: |
          set -euo pipefail
          expected=$'firecracker\njailer\nruntime-checksums.txt\nruntime-manifest.json'
          actual="$(find dist/firecracker-runtime -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)"
          [ "$actual" = "$expected" ] || {
            echo "Runtime candidate does not contain exactly the four expected assets" >&2
            exit 1
          }
          scripts/verify-firecracker-runtime-bundle.py \
            dist/firecracker-runtime "$RUNTIME_ID" "$GITHUB_SHA" \
            security/firecracker-runtime-policy.json scripts/resolve-firecracker-runtime-policy.py
          (cd dist/firecracker-runtime && sha256sum --check --strict runtime-checksums.txt)

      - name: Prepare immutable release notes
        env:
          RUNTIME_ID: ${{ steps.revision.outputs.runtime_id }}
          UPSTREAM_VERSION: ${{ needs.discover.outputs.upstream_version }}
        run: |
          set -euo pipefail
          {
            echo "Verified Firecracker runtime candidate $RUNTIME_ID"
            echo
            echo "Upstream version: $UPSTREAM_VERSION"
            echo "Repository commit: $GITHUB_SHA"
            echo "Workflow run: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } >dist/firecracker-runtime-release-notes.md

      - name: Mint repository-scoped runtime publication token
        id: runtime-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.YEET_RUNTIME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.YEET_RUNTIME_GITHUB_APP_PRIVATE_KEY }}
          owner: yeetrun
          repositories: yeet-vm-images
          permission-administration: read
          permission-contents: write

      - name: Publish candidate
        id: publish
        env:
          GH_TOKEN: ${{ steps.runtime-app-token.outputs.token }}
          RUNTIME_ID: ${{ steps.revision.outputs.runtime_id }}
          YEET_RUNTIME_WORKFLOW_FILE_PATH: ${{ job.workflow_file_path }}
          YEET_RUNTIME_WORKFLOW_REF: ${{ job.workflow_ref }}
          YEET_RUNTIME_WORKFLOW_REPOSITORY: ${{ job.workflow_repository }}
          YEET_RUNTIME_WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          set -euo pipefail
          scripts/publish-firecracker-runtime-assets.sh \
            --runtime-id "$RUNTIME_ID" \
            --target "$GITHUB_SHA" \
            --notes-file dist/firecracker-runtime-release-notes.md \
            --out dist/firecracker-runtime

          manifest_sha256="$(sha256sum dist/firecracker-runtime/runtime-manifest.json | awk '{print $1}')"
          manifest_url="https://github.com/$GITHUB_REPOSITORY/releases/download/$RUNTIME_ID/runtime-manifest.json"
          release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$RUNTIME_ID"
          {
            echo "runtime_id=$RUNTIME_ID"
            echo "manifest_url=$manifest_url"
            echo "manifest_sha256=$manifest_sha256"
            echo "release_url=$release_url"
          } >>"$GITHUB_OUTPUT"

          {
            echo "### Firecracker runtime candidate"
            echo
            echo "- Runtime: \`$RUNTIME_ID\`"
            echo "- Manifest: $manifest_url"
            echo "- Manifest SHA-256: \`$manifest_sha256\`"
            echo "- Release: $release_url"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Report candidate publication failure
        if: ${{ failure() }}
        run: |
          {
            echo "### Firecracker runtime candidate publication failed"
            echo
            echo "Candidate publication failed. Inspect the failed step; do not reuse a consumed runtime ID."
          } >>"$GITHUB_STEP_SUMMARY"
          exit 1

  summarize:
    needs: [discover, publish-firecracker-runtime]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Summarize candidate publication
        env:
          DISCOVERY_RESULT: ${{ needs.discover.result }}
          MANIFEST_SHA256: ${{ needs.publish-firecracker-runtime.outputs.manifest_sha256 }}
          MANIFEST_URL: ${{ needs.publish-firecracker-runtime.outputs.manifest_url }}
          PUBLISH_RESULT: ${{ needs.publish-firecracker-runtime.result }}
          RELEASE_URL: ${{ needs.publish-firecracker-runtime.outputs.release_url }}
          RUNTIME_ID: ${{ needs.publish-firecracker-runtime.outputs.runtime_id }}
          SHOULD_PUBLISH: ${{ needs.discover.outputs.should_publish }}
        run: |
          set -euo pipefail
          if [ "$DISCOVERY_RESULT" != success ]; then
            {
              echo "### Stable Firecracker discovery failed"
              echo
              echo "Discovery failed. Inspect the failed step before retrying."
            } >>"$GITHUB_STEP_SUMMARY"
            echo "Stable Firecracker discovery did not complete" >&2
            exit 1
          fi
          if [ "$SHOULD_PUBLISH" != true ]; then
            echo "Candidate already exists; no publication requested." >>"$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "$PUBLISH_RESULT" != success ]; then
            {
              echo "### Firecracker runtime candidate publication failed"
              echo
              echo "Candidate publication failed. Inspect the failed step; do not reuse a consumed runtime ID."
            } >>"$GITHUB_STEP_SUMMARY"
            echo "Candidate publication did not complete" >&2
            exit 1
          fi
          if [ -z "$RUNTIME_ID" ] || [ -z "$MANIFEST_URL" ] || [ -z "$MANIFEST_SHA256" ] || [ -z "$RELEASE_URL" ]; then
            {
              echo "### Firecracker runtime candidate outputs missing"
              echo
              echo "Candidate outputs are missing. Inspect the publication job and preserved release state."
            } >>"$GITHUB_STEP_SUMMARY"
            echo "Candidate publication did not produce the required outputs" >&2
            exit 1
          fi
          {
            echo "Candidate publication completed."
            echo
            echo "- Runtime: \`$RUNTIME_ID\`"
            echo "- Manifest: $MANIFEST_URL"
            echo "- Manifest SHA-256: \`$MANIFEST_SHA256\`"
            echo "- Release: $RELEASE_URL"
          } >>"$GITHUB_STEP_SUMMARY"
