name: Build yeet kernel

on:
  workflow_call:
    inputs:
      kernel_release:
        description: Canonical kernel release tag to publish, for example kernel-linux-7.1.1-yeet-v1.
        required: true
        type: string
      kernel_version:
        description: Upstream Linux kernel version to build.
        required: true
        type: string
      kernel_source_url:
        description: Linux kernel source tarball URL.
        required: true
        type: string
      kernel_source_sha256:
        description: Linux kernel source tarball SHA-256.
        required: true
        type: string
      kernel_config_url:
        description: Firecracker guest kernel config URL.
        required: true
        type: string
      overwrite_release:
        description: Delete an existing release/tag with the same version before publishing.
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      kernel_release:
        description: Canonical kernel release tag to publish, for example kernel-linux-7.1.1-yeet-v1.
        required: true
      kernel_version:
        description: Upstream Linux kernel version to build.
        required: true
      kernel_source_url:
        description: Linux kernel source tarball URL.
        required: true
      kernel_source_sha256:
        description: Linux kernel source tarball SHA-256.
        required: true
      kernel_config_url:
        description: Firecracker guest kernel config URL.
        required: true
      overwrite_release:
        description: Delete an existing release/tag with the same version before publishing.
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build and publish canonical kernel
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      KERNEL_RELEASE: ${{ inputs.kernel_release }}
      KERNEL_VERSION: ${{ inputs.kernel_version }}
      KERNEL_SOURCE_URL: ${{ inputs.kernel_source_url }}
      KERNEL_SOURCE_SHA256: ${{ inputs.kernel_source_sha256 }}
      KERNEL_CONFIG_URL: ${{ inputs.kernel_config_url }}
      KERNEL_OUT_DIR: dist/${{ inputs.kernel_release }}
      YEET_KERNEL_VERSION: ${{ inputs.kernel_version }}
      YEET_KERNEL_SOURCE_URL: ${{ inputs.kernel_source_url }}
      YEET_KERNEL_SOURCE_SHA256: ${{ inputs.kernel_source_sha256 }}
      YEET_KERNEL_CONFIG_URL: ${{ inputs.kernel_config_url }}
      YEET_KERNEL_WORK_DIR: ${{ github.workspace }}/.kernel-build-work
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            curl \
            dwarves \
            file \
            flex \
            jq \
            libelf-dev \
            libssl-dev \
            ncurses-bin \
            xz-utils

      - name: Build kernel
        run: |
          scripts/build-linux-kernel.sh "$KERNEL_OUT_DIR"

      - name: Write kernel manifest
        run: |
          set -euo pipefail
          packaging_revision="${KERNEL_RELEASE##*-v}"
          workflow_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          scripts/render-kernel-manifest.sh \
            --kernel-id "$KERNEL_RELEASE" \
            --upstream-version "$KERNEL_VERSION" \
            --packaging-revision "$packaging_revision" \
            --architecture amd64 \
            --vmlinux "$KERNEL_OUT_DIR/vmlinux" \
            --config "$KERNEL_OUT_DIR/kernel.config" \
            --source-commit "$GITHUB_SHA" \
            --workflow-run-url "$workflow_run_url" \
            --out "$KERNEL_OUT_DIR/kernel-manifest.json"
          (
            cd "$KERNEL_OUT_DIR"
            sha256sum vmlinux kernel.config kernel-manifest.json > kernel-checksums.txt
          )

      - name: Verify kernel assets
        run: |
          set -euo pipefail
          for asset in vmlinux kernel.config kernel-manifest.json kernel-checksums.txt; do
            test -s "$KERNEL_OUT_DIR/$asset"
          done
          (cd "$KERNEL_OUT_DIR" && sha256sum -c kernel-checksums.txt)
          check_manifest_checksum() {
            local asset="$1"
            local want
            local got
            case "$asset" in
              vmlinux) want="$(jq -r '.vmlinux.sha256' "$KERNEL_OUT_DIR/kernel-manifest.json")" ;;
              kernel.config) want="$(jq -r '.config.sha256' "$KERNEL_OUT_DIR/kernel-manifest.json")" ;;
              *) echo "unsupported manifest asset: $asset" >&2; exit 1 ;;
            esac
            if [ -z "$want" ]; then
              echo "manifest missing checksum for $asset" >&2
              exit 1
            fi
            got="$(sha256sum "$KERNEL_OUT_DIR/$asset" | awk '{ print $1 }')"
            if [ "$got" != "$want" ]; then
              echo "manifest checksum mismatch for $asset: got $got, want $want" >&2
              exit 1
            fi
          }
          check_manifest_checksum vmlinux
          check_manifest_checksum kernel.config
          jq -e '
            .schema_version == 1 and
            .kernel_id == env.KERNEL_RELEASE and
            .upstream_version == env.KERNEL_VERSION and
            .kernel_id == "kernel-linux-\(.upstream_version)-yeet-v\(.packaging_revision)" and
            .architecture == "amd64" and
            .guest_packages.selector_schema_version == 2 and
            .guest_packages.release_id == env.KERNEL_RELEASE and
            (.vmlinux.sha256 | test("^[0-9a-f]{64}$")) and
            (.config.sha256 | test("^[0-9a-f]{64}$"))
          ' "$KERNEL_OUT_DIR/kernel-manifest.json"

      - name: Check immutable release target
        id: release_target
        run: |
          set -euo pipefail
          if [ "${{ inputs.overwrite_release }}" = "true" ]; then
            echo "kernel releases are immutable; overwrite_release is no longer supported" >&2
            exit 1
          fi
          release_exists=0
          tag_exists=0
          if gh release view "$KERNEL_RELEASE" >/dev/null 2>&1; then
            release_exists=1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$KERNEL_RELEASE" >/dev/null 2>&1; then
            tag_exists=1
          fi
          if [ "$release_exists" -eq 0 ] && [ "$tag_exists" -eq 0 ]; then
            echo "published=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$release_exists" -ne 1 ] || [ "$tag_exists" -ne 1 ]; then
            echo "kernel release/tag state is incomplete for $KERNEL_RELEASE" >&2
            exit 1
          fi
          published_dir="$RUNNER_TEMP/published-kernel-release"
          mkdir -p "$published_dir"
          gh release download "$KERNEL_RELEASE" --pattern kernel-manifest.json --dir "$published_dir"
          expected="$(sha256sum "$KERNEL_OUT_DIR/kernel-manifest.json" | awk '{ print $1 }')"
          published="$(sha256sum "$published_dir/kernel-manifest.json" | awk '{ print $1 }')"
          if [ "$published" != "$expected" ]; then
            echo "immutable kernel release $KERNEL_RELEASE has manifest $published, built manifest is $expected" >&2
            exit 1
          fi
          echo "published=true" >>"$GITHUB_OUTPUT"

      - name: Prepare release notes
        run: |
          cat <<EOF >"$KERNEL_OUT_DIR/release-notes.md"
          Canonical yeet Firecracker kernel.

          - Release: \`$KERNEL_RELEASE\`
          - Kernel: \`linux-${KERNEL_VERSION}-yeet\`
          - Source: <$KERNEL_SOURCE_URL>
          - Config: <$KERNEL_CONFIG_URL>

          See \`kernel-manifest.json\` for checksums and provenance.
          EOF

      - name: Publish release
        if: ${{ steps.release_target.outputs.published != 'true' }}
        run: |
          scripts/publish-kernel-release-assets.sh \
            "$KERNEL_RELEASE" \
            "$KERNEL_RELEASE" \
            "$GITHUB_SHA" \
            "$KERNEL_OUT_DIR/release-notes.md" \
            "$KERNEL_OUT_DIR"
