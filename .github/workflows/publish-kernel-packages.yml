name: Publish kernel package sources

on:
  workflow_call:
    inputs:
      kernel_version:
        description: Upstream Linux kernel version to package.
        required: true
        type: string
      kernel_release:
        description: Immutable canonical kernel release whose vmlinux and kernel.config assets should be packaged.
        required: true
        type: string
    outputs:
      metadata_commit:
        description: Commit SHA containing the published kernel package metadata.
        value: ${{ jobs.packages.outputs.metadata_commit }}
  workflow_dispatch:
    inputs:
      kernel_version:
        description: Upstream Linux kernel version to package.
        required: true
      kernel_release:
        description: Immutable canonical kernel release whose vmlinux and kernel.config assets should be packaged.
        required: true

concurrency:
  group: publish-kernel-packages-main
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  packages:
    runs-on: ubuntu-24.04
    outputs:
      metadata_commit: ${{ steps.metadata_commit.outputs.metadata_commit }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      KERNEL_VERSION: ${{ inputs.kernel_version }}
      KERNEL_RELEASE: ${{ inputs.kernel_release }}
      YEET_APT_GPG_PRIVATE_KEY: ${{ secrets.YEET_APT_GPG_PRIVATE_KEY }}
      YEET_APT_GPG_KEY_ID: ${{ secrets.YEET_APT_GPG_KEY_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate publish ref
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "kernel package publishing must run from refs/heads/main, got $GITHUB_REF" >&2
            exit 1
          fi
          git fetch origin main
          git checkout -B main origin/main

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils curl dpkg-dev gnupg jq python3

      - name: Download canonical kernel assets
        run: |
          set -euo pipefail

          kernel_dir="dist/kernel-package-source"
          YEET_KERNEL_VERSION="$KERNEL_VERSION" \
            scripts/download-kernel-release.sh "$KERNEL_RELEASE" "$kernel_dir"

      - name: Build deb and apt repo
        run: |
          set -euo pipefail
          manifest_sha256="$(sha256sum dist/kernel-package-source/kernel-manifest.json | awk '{ print $1 }')"
          YEET_VM_KERNEL_VERSION="linux-${KERNEL_VERSION}-yeet" \
            YEET_VM_KERNEL_RELEASE_ID="$KERNEL_RELEASE" \
            YEET_VM_KERNEL_MANIFEST_SHA256="$manifest_sha256" \
            scripts/build-kernel-deb.sh dist/kernel-package-source dist/kernel-packages/deb
          scripts/publish-apt-repo.sh dist/kernel-packages/deb dist/kernel-packages/site/apt

      - name: Generate Nix package metadata
        run: |
          set -euo pipefail

          sri_from_hex() {
            python3 -c 'import base64, binascii, sys; print("sha256-" + base64.b64encode(binascii.unhexlify(sys.argv[1])).decode())' "$1"
          }

          vmlinux_sha="$(sha256sum dist/kernel-package-source/vmlinux | awk '{ print $1 }')"
          kernel_config_sha="$(sha256sum dist/kernel-package-source/kernel.config | awk '{ print $1 }')"
          manifest_sha256="$(sha256sum dist/kernel-package-source/kernel-manifest.json | awk '{ print $1 }')"
          asset_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${KERNEL_RELEASE}"
          packaging_revision="${KERNEL_RELEASE##*-v}"
          deb_version="${KERNEL_VERSION}-${packaging_revision}"

          cat >kernel-packages/metadata.nix <<NIX
          {
            kernelVersion = "$KERNEL_VERSION";
            releaseId = "$KERNEL_RELEASE";
            manifestSha256 = "$manifest_sha256";
            vmlinuxUrl = "$asset_base/vmlinux";
            kernelConfigUrl = "$asset_base/kernel.config";
            vmlinuxHash = "$(sri_from_hex "$vmlinux_sha")";
            kernelConfigHash = "$(sri_from_hex "$kernel_config_sha")";
            vmlinuxSha256Raw = "$vmlinux_sha";
            kernelConfigSha256Raw = "$kernel_config_sha";
          }
          NIX

          jq -n \
            --arg release_id "$KERNEL_RELEASE" \
            --arg manifest_sha256 "$manifest_sha256" \
            --arg version "$deb_version" '
            {
              schema_version: 1,
              release_id: $release_id,
              manifest_sha256: $manifest_sha256,
              selector_schema_version: 2,
              debian: {
                repository_url: "https://yeetrun.github.io/yeet-vm-images/apt",
                package: "yeet-vm-kernel",
                version: $version
              },
              nix: {
                metadata_url: "https://raw.githubusercontent.com/yeetrun/yeet-vm-images/main/kernel-packages/metadata.nix"
              }
            }
          ' >kernel-packages/catalog.json

      - name: Verify selector package metadata
        run: |
          set -euo pipefail
          manifest_sha256="$(sha256sum dist/kernel-package-source/kernel-manifest.json | awk '{ print $1 }')"
          deb="$(find dist/kernel-packages/deb -maxdepth 1 -name 'yeet-vm-kernel_*_amd64.deb' -print -quit)"
          test -n "$deb"
          extracted="$RUNNER_TEMP/kernel-package"
          dpkg-deb -x "$deb" "$extracted"
          jq -e --arg release "$KERNEL_RELEASE" --arg manifest "$manifest_sha256" '
            .schema_version == 2 and
            .release_id == $release and
            .manifest_sha256 == $manifest
          ' "$extracted/usr/lib/yeet-vm/kernels/linux-${KERNEL_VERSION}-yeet/release.json"
          grep -Fq "releaseId = \"$KERNEL_RELEASE\";" kernel-packages/metadata.nix
          grep -Fq "manifestSha256 = \"$manifest_sha256\";" kernel-packages/metadata.nix
          jq -e --arg release "$KERNEL_RELEASE" --arg manifest "$manifest_sha256" '
            .release_id == $release and
            .manifest_sha256 == $manifest and
            .selector_schema_version == 2
          ' kernel-packages/catalog.json

      - name: Commit Nix package metadata
        id: metadata_commit
        run: |
          set -euo pipefail

          if git diff --quiet -- kernel-packages/metadata.nix kernel-packages/catalog.json; then
            echo "kernel package metadata is unchanged"
            echo "metadata_commit=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          expected_base="$(git rev-parse HEAD)"
          git fetch origin main
          remote_base="$(git rev-parse origin/main)"
          if [ "$expected_base" != "$remote_base" ]; then
            echo "origin/main advanced while publishing kernel metadata; re-run the workflow" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kernel-packages/metadata.nix kernel-packages/catalog.json
          git commit -m "packages: update yeet VM kernel metadata for ${KERNEL_VERSION}"
          git push --force-with-lease=refs/heads/main:"$remote_base" origin HEAD:main
          echo "metadata_commit=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail

          site="dist/kernel-packages/site"
          mkdir -p "$site/kernel-packages"
          cp kernel-packages/flake.nix "$site/kernel-packages/flake.nix"
          cp kernel-packages/metadata.nix "$site/kernel-packages/metadata.nix"
          cp kernel-packages/catalog.json "$site/kernel-packages/catalog.json"
          cp kernel-packages/yeet-kernel-package.nix "$site/kernel-packages/yeet-kernel-package.nix"
          tar -C "$site/kernel-packages" -czf "$site/yeet-vm-kernel-flake.tar.gz" .
          cat >"$site/index.html" <<HTML
          <!doctype html>
          <meta charset="utf-8">
          <title>yeet VM kernel packages</title>
          <h1>yeet VM kernel packages</h1>
          <ul>
            <li><a href="apt/dists/stable/Release">apt repository</a></li>
            <li><a href="yeet-vm-kernel-flake.tar.gz">Nix flake tarball</a></li>
          </ul>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/kernel-packages/site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Re-download and verify published selector metadata
        run: |
          set -euo pipefail
          page_url="${{ steps.deployment.outputs.page_url }}"
          page_url="${page_url%/}"
          manifest_sha256="$(sha256sum dist/kernel-package-source/kernel-manifest.json | awk '{ print $1 }')"
          curl -fsSL --retry 6 --retry-all-errors \
            -o "$RUNNER_TEMP/published-kernel-catalog.json" \
            "$page_url/kernel-packages/catalog.json"
          jq -e --arg release "$KERNEL_RELEASE" --arg manifest "$manifest_sha256" '
            .release_id == $release and
            .manifest_sha256 == $manifest and
            .selector_schema_version == 2
          ' "$RUNNER_TEMP/published-kernel-catalog.json"

          curl -fsSL --retry 6 --retry-all-errors \
            -o "$RUNNER_TEMP/published-metadata.nix" \
            "$page_url/kernel-packages/metadata.nix"
          cmp kernel-packages/metadata.nix "$RUNNER_TEMP/published-metadata.nix"

          deb="$(find dist/kernel-packages/deb -maxdepth 1 -name 'yeet-vm-kernel_*_amd64.deb' -print -quit)"
          deb_name="$(basename "$deb")"
          curl -fsSL --retry 6 --retry-all-errors \
            -o "$RUNNER_TEMP/$deb_name" \
            "$page_url/apt/pool/main/$deb_name"
          cmp "$deb" "$RUNNER_TEMP/$deb_name"
